# This is the "recipe" GitHub Actions follows every time new code is pushed:
# build the APK on GitHub's servers, then publish it on the Releases page
# as a plain download link for the phone.
name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: {} # also allows starting a build by hand from the website

permissions:
  contents: write # allows publishing the release and saving the signing key

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Install Java 17 (needed by the Android build tools)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Gradle (the build tool)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Create the signing key once and save it to the repo
        # An APK must be "signed" (stamped) to install. The stamp must be the
        # SAME every build or the phone refuses updates — so the first build
        # creates a key file and commits it back to the repo for reuse.
        run: |
          if [ ! -f signing/debug.keystore ]; then
            mkdir -p signing
            keytool -genkeypair -v \
              -keystore signing/debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -dname "CN=LiquidGlass Debug" \
              -keyalg RSA -keysize 2048 -validity 10000
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add signing/debug.keystore
            git commit -m "Add persistent debug signing key [skip ci]"
            git push
          fi

      - name: Draw the icon artwork (both styles)
        run: |
          python3 -m pip install --quiet pillow
          python3 tools/generate_icons.py iconpack/src/main/res/drawable-nodpi preview-disco.png disco
          python3 tools/generate_icons.py blueprint/src/main/res/drawable-nodpi preview-blueprint.png blueprint
          python3 tools/generate_icons.py duo/src/main/res/drawable-nodpi preview-duo.png duo
          # user-supplied artwork (art/duo/*.png) overrides generated icons
          if [ -d art/duo ] && [ -n "$(ls -A art/duo 2>/dev/null)" ]; then
            python3 tools/process_custom_icons.py art/duo duo/src/main/res/drawable-nodpi
          fi

      - name: Build the APKs
        run: gradle :app:assembleDebug :iconpack:assembleDebug :blueprint:assembleDebug :duo:assembleDebug :gallery:assembleDebug :music:assembleDebug

      - name: Publish on the Releases page
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk LiquidGlassLauncher.apk
          cp iconpack/build/outputs/apk/debug/iconpack-debug.apk DiscoIcons.apk
          cp blueprint/build/outputs/apk/debug/blueprint-debug.apk BlueprintIcons.apk
          cp duo/build/outputs/apk/debug/duo-debug.apk DiscoDuo.apk
          cp gallery/build/outputs/apk/debug/gallery-debug.apk PhotoWheel.apk
          cp music/build/outputs/apk/debug/music-debug.apk MusicPlayer.apk
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest MusicPlayer.apk PhotoWheel.apk DiscoIcons.apk BlueprintIcons.apk DiscoDuo.apk LiquidGlassLauncher.apk preview-disco.png preview-blueprint.png preview-duo.png \
            --title "Latest build" \
            --notes "Built $(date -u '+%Y-%m-%d %H:%M') UTC. MusicPlayer.apk = local music player (Stage 1: plays your files, lock-screen controls). PhotoWheel.apk = gallery with date picker wheel. Icon packs: DiscoIcons.apk (mirror-ball), BlueprintIcons.apk (frosted drafting glass), DiscoDuo.apk (YouTube + Spotify + Claude custom art). The preview-*.png files show every icon. LiquidGlassLauncher.apk = the old launcher experiment."
